# ============================================================
# macOS system defaults
# Most changes take effect after logout or after the affected
# app is restarted (Finder/Dock are killed at the end).
# ============================================================

# --- Keyboard ---

# Fastest key repeat rate (lower = faster). Great for holding keys.
- name: Set fast key repeat rate
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: KeyRepeat
    type: int
    value: 2
    state: present

# Short delay before a held key starts repeating (lower = shorter).
- name: Set short delay until key repeat
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: InitialKeyRepeat
    type: int
    value: 15
    state: present

# Disable the accent-character popup on key-hold so holding a key
# repeats it instead (better for vim/nvim navigation).
- name: Disable press-and-hold accent popup
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: ApplePressAndHoldEnabled
    type: bool
    value: false
    state: present

# --- Finder ---

# Always show file extensions.
- name: Show all file extensions
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: AppleShowAllExtensions
    type: bool
    value: true
    state: present

# Show hidden (dotfiles) files in Finder.
- name: Show hidden files
  community.general.osx_defaults:
    domain: com.apple.finder
    key: AppleShowAllFiles
    type: bool
    value: true
    state: present

# Show the path bar at the bottom of Finder windows.
- name: Show Finder path bar
  community.general.osx_defaults:
    domain: com.apple.finder
    key: ShowPathbar
    type: bool
    value: true
    state: present

# Show the status bar at the bottom of Finder windows.
- name: Show Finder status bar
  community.general.osx_defaults:
    domain: com.apple.finder
    key: ShowStatusBar
    type: bool
    value: true
    state: present

# Use list view by default in all Finder windows (Nlsv = list).
- name: Use list view in Finder
  community.general.osx_defaults:
    domain: com.apple.finder
    key: FXPreferredViewStyle
    type: string
    value: Nlsv
    state: present

# Search the current folder by default instead of the whole Mac.
- name: Search current folder by default
  community.general.osx_defaults:
    domain: com.apple.finder
    key: FXDefaultSearchScope
    type: string
    value: SCcf
    state: present

# --- Screenshots ---

# Ensure the screenshots directory exists.
- name: Create screenshots directory
  file:
    path: "{{ lookup('env', 'HOME') }}/Screenshots"
    state: directory

# Save screenshots to ~/Screenshots instead of cluttering the Desktop.
- name: Save screenshots to ~/Screenshots
  community.general.osx_defaults:
    domain: com.apple.screencapture
    key: location
    type: string
    value: "{{ lookup('env', 'HOME') }}/Screenshots"
    state: present

# Remove the drop shadow around window screenshots.
- name: Disable screenshot window shadow
  community.general.osx_defaults:
    domain: com.apple.screencapture
    key: disable-shadow
    type: bool
    value: true
    state: present

# --- Dock ---

# Auto-hide the Dock.
- name: Auto-hide the Dock
  community.general.osx_defaults:
    domain: com.apple.dock
    key: autohide
    type: bool
    value: true
    state: present

# Remove the delay before the Dock shows on hover.
- name: Remove Dock auto-hide delay
  community.general.osx_defaults:
    domain: com.apple.dock
    key: autohide-delay
    type: float
    value: 0
    state: present

# Smaller Dock icon size.
- name: Set Dock tile size
  community.general.osx_defaults:
    domain: com.apple.dock
    key: tilesize
    type: int
    value: 48
    state: present

# Don't auto-reorder Spaces by most-recent use (keeps desktops stable).
- name: Disable Spaces auto-rearrange
  community.general.osx_defaults:
    domain: com.apple.dock
    key: mru-spaces
    type: bool
    value: false
    state: present

# --- General UX ---

# Expand the save panel by default.
- name: Expand save panel by default
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSNavPanelExpandedStateForSaveMode
    type: bool
    value: true
    state: present

# Expand the print panel by default.
- name: Expand print panel by default
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: PMPrintingExpandedStateForPrint
    type: bool
    value: true
    state: present

# Disable automatic spelling correction (annoying when coding).
- name: Disable auto-correct
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSAutomaticSpellingCorrectionEnabled
    type: bool
    value: false
    state: present

# Disable smart quotes (keeps straight quotes in code/text).
- name: Disable smart quotes
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSAutomaticQuoteSubstitutionEnabled
    type: bool
    value: false
    state: present

# Disable smart dashes.
- name: Disable smart dashes
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: NSAutomaticDashSubstitutionEnabled
    type: bool
    value: false
    state: present

# --- Apply changes ---

# Restart affected apps so the settings above take effect immediately.
- name: Restart Finder, Dock, and SystemUIServer
  shell: killall Finder Dock SystemUIServer
  ignore_errors: true
